<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeployDesk — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300..600;1,300..600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="pub-nav">
    <div class="logo" onclick="goTo('landing')">
      <div class="logo-icon">🚀</div>
      <div class="logo-text">DeployDesk</div>
    </div>
    <div class="spacer"></div>
    <div class="nav-links">
      <span class="nav-link" onclick="goTo('landing')">Home</span>
      <span class="nav-link" onclick="goTo('login')">Log In</span>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-card">
      <div class="auth-logo" onclick="goTo('landing')">
        <div class="logo-icon">🚀</div>
        <div class="logo-text">DeployDesk</div>
      </div>
      <div class="auth-title">Reset Password</div>
      <div class="auth-sub" style="margin-bottom: 24px;">Enter your campus email to receive a secure reset link.</div>

      <div class="validation-banner error" id="resetErr"></div>
      <div class="validation-banner success" id="resetSucc" style="background:#eafbf1; color:#158244; border:1px solid #c3f1d5;"></div>

      <div class="form-group" style="margin-bottom: 24px;">
        <label>Campus Email</label>
        <input type="email" id="resetEmail" placeholder="you@university.edu" />
      </div>

      <button class="btn btn-primary btn-full" onclick="requestPasswordReset()">Send Reset Link</button>

      <div class="auth-footer-text" style="margin-top: 24px;">
        Remembered your password? <a href="login.html" style="color: var(--accent); font-weight: 700;">Log In</a>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="app.js"></script>
</body>
</html>
