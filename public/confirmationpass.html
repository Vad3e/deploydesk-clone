<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeployDesk — Confirm New Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ece8e8;
      --surface: #ffffff;
      --primary: #1f9b45;
      --primary-dark: #137038;
      --text: #10281f;
      --muted: #516464;
      --border: rgba(31, 97, 59, 0.14);
      --input-bg: #f8fbf7;
      --success: #1f6f4d;
      --error: #9f2a2b;
      --surface-strong: #e6f2e9;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 64px;
      background: #1f9b45;
      color: #fff;
      box-shadow: 0 3px 12px rgba(15, 77, 31, 0.12);
    }

    .site-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #1f7f36;
      display: grid;
      place-items: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
      font-size: 24px;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .site-nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .site-nav .signup-btn {
      padding: 10px 18px;
      border-radius: 999px;
      background: #0f6b2c;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      transition: background .2s ease;
    }

    .site-nav .signup-btn:hover {
      background: #0d5926;
    }

    .page-shell {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 96px 24px 40px;
    }

    .card {
      width: min(500px, 100%);
      background: var(--surface);
      border-radius: 24px;
      box-shadow: 0 22px 45px rgba(31, 97, 59, 0.08);
      padding: 40px 36px;
      border: 1px solid rgba(31, 97, 59, 0.08);
    }

    .card-title {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: 0.02em;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--primary);
    }

    .card-copy {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #243447;
    }

    .form-input {
      width: 100%;
      min-height: 52px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-size: 15px;
      color: #18212f;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-visibility {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #2d3e3c;
      cursor: pointer;
      width: 36px;
      height: 36px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .toggle-visibility svg {
      width: 18px;
      height: 18px;
    }

    .form-input:focus {
      border-color: rgba(31, 153, 69, .45);
      box-shadow: 0 0 0 4px rgba(31, 153, 69, .12);
    }

    .helper-text {
      margin: 8px 0 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .feedback {
      min-height: 32px;
      margin-bottom: 18px;
      font-size: 14px;
      line-height: 1.5;
      border-radius: 14px;
      padding: 14px 16px;
      display: none;
    }
    .feedback.error { color: var(--error); background: #fff2f2; border: 1px solid rgba(159, 42, 43, 0.18); }
    .feedback.success { color: var(--success); background: #ecf7f0; border: 1px solid rgba(31, 111, 77, 0.18); }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px 18px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s ease, transform .15s ease;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn:active { transform: translateY(1px); }

    .footer-copy {
      margin-top: 22px;
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }
    .footer-copy a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }

    @media (max-width: 520px) {
      .card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="site-brand">
      <span class="brand-mark">🚀</span>
      DeployDesk
    </a>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="login.html">Log In</a>
      <a href="signup.html" class="signup-btn">Sign Up</a>
    </nav>
  </header>
  <main class="page-shell">
    <section class="card">
      <h1 class="card-title">Set your new password</h1>
      <p class="card-copy">Enter a secure password below and confirm it. </p>

      <div class="feedback error" id="pwdError"></div>
      <div class="feedback success" id="pwdSuccess"></div>

      <div class="form-group">
        <label for="newPassword">New password</label>
        <div class="password-wrapper">
          <input type="password" id="newPassword" class="form-input" placeholder="Create a new password" autocomplete="new-password" oninput="checkStrength()" />
          <button type="button" class="toggle-visibility" onclick="togglePassword('newPassword', this)" aria-label="Toggle visibility">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5C7 5 2.73 8.11 1 12.5c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5z"/><circle cx="12" cy="12" r="2.5"/><path d="M3 3l18 18"/></svg>
          </button>
        </div>
        <p class="helper-text">Password strength: Use at least 8 characters and combination of numbers or special characters.</p>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm new password</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password" autocomplete="new-password" />
          <button type="button" class="toggle-visibility" onclick="togglePassword('confirmPassword', this)" aria-label="Toggle visibility">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5C7 5 2.73 8.11 1 12.5c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5z"/><circle cx="12" cy="12" r="2.5"/><path d="M3 3l18 18"/></svg>
          </button>
        </div>
      </div>

      <button class="btn" onclick="submitNewPassword()">Change password</button>

      <div class="footer-copy">Remembered your password? <a href="login.html">Log in</a></div>
    </section>
  </main>

  <script>
    var eyeOpen = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5C7 5 2.73 8.11 1 12.5c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5z"/><circle cx="12" cy="12" r="2.5"/></svg>';
    var eyeClosed = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5C7 5 2.73 8.11 1 12.5c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5z"/><circle cx="12" cy="12" r="2.5"/><path d="M3 3l18 18"/></svg>';

    function togglePassword(inputId, button) {
      var input = document.getElementById(inputId);
      if (!input) return;
      var isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      button.innerHTML = isHidden ? eyeOpen : eyeClosed;
    }

    function checkStrength() {
      var value = document.getElementById('newPassword').value;
      var helper = document.querySelector('.helper-text');
      if (value.length > 0 && value.length < 8) {
        helper.textContent = 'Password is too short. Use at least 8 characters.';
        helper.style.color = '#8c1b1b';
      } else {
        helper.textContent = 'Password strength: Use at least 8 characters. Don’t use a password from another site, or something too obvious like your pet’s name.';
        helper.style.color = '';
      }
    }

    // ⚡ FIX: Connect to the backend API to actually change the password
    async function submitNewPassword() {
      var pwd = document.getElementById('newPassword').value; 
      var confirm = document.getElementById('confirmPassword').value; 
      var err = document.getElementById('pwdError');
      var succ = document.getElementById('pwdSuccess');
      
      err.style.display = 'none';
      succ.style.display = 'none';

      if (!pwd || !confirm) {
        err.textContent = 'Please enter and confirm your new password.';
        err.style.display = 'block';
        return;
      }
      if (pwd.length < 8) {
        err.textContent = 'Your password must be at least 8 characters long.';
        err.style.display = 'block';
        return;
      }
      if (pwd !== confirm) {
        err.textContent = 'The passwords do not match. Please try again.';
        err.style.display = 'block';
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        err.textContent = 'Invalid or missing reset token. Please request a new link from the login page.';
        err.style.display = 'block';
        return;
      }

      try {
        const response = await fetch('https://backend-88na.onrender.com/api/reset-password', {
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, newPassword: pwd })
        });
        
        const data = await response.json();

        if (data.success) {
            succ.textContent = 'Your password has been updated successfully! Redirecting to login...';
            succ.style.display = 'block';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } else {
            err.textContent = data.message || 'Failed to update password. The link may have expired.';
            err.style.display = 'block';
        }
      } catch (error) {
        err.textContent = 'Server connection error. Please try again later.';
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
