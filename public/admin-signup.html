<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeployDesk — Admin Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300..600;1,300..600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"> 
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #1BA354;
      --green-dark: #158244;
      --green-nav:  #111111; /* Dark nav for admin */
      --black:      #111111;
      --text1:      #111111;
      --text2:      #555555;
      --text3:      #888888;
      --bg:         #ffffff;
      --bg2:        #f4f4f4;
      --border:     #e0e0e0;
      --card-bg:    #f0f0f0;
      --radius:     14px;
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg2); color: var(--text1); min-height: 100vh; }

    /* ── NAV ── */
    .pub-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--green-nav); display: flex; align-items: center; padding: 0 32px; height: 60px; box-shadow: 0 2px 12px rgba(0,0,0,.18); }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
    .logo-icon { width: 36px; height: 36px; background: rgba(255,255,255,.18); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; color: #fff; letter-spacing: -.3px; }
    .spacer { flex: 1; }
    .nav-links { display: flex; align-items: center; gap: 6px; }
    .nav-link { color: rgba(255,255,255,.82); font-size: 14px; font-weight: 500; padding: 6px 14px; border-radius: 7px; cursor: pointer; transition: background .15s, color .15s; border: none; background: none; font-family: 'DM Sans', sans-serif; text-decoration: none; display: inline-block; }
    .nav-link:hover { background: rgba(255,255,255,.12); color: #fff; }

    /* ── BUTTONS ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; border: none; transition: all .2s cubic-bezier(.4,0,.2,1); cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; text-decoration: none; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(27,163,84,.3); }
    .btn-full { width: 100%; justify-content: center; }
    .btn-lg { padding: 14px 32px; font-size: 15px; font-weight: 600; }

    /* ── PAGE LAYOUT ── */
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 16px 40px; }
    .auth-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 40px 40px 36px; width: 100%; max-width: 480px; box-shadow: 0 4px 32px rgba(0,0,0,.07); }

    .auth-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 22px; text-decoration: none; }
    .auth-logo .logo-icon { width: 34px; height: 34px; font-size: 16px; background: rgba(255,255,255,.7); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .auth-logo .logo-text { color: var(--black); font-size: 17px; font-family: 'Syne', sans-serif; font-weight: 700; }
    
    .auth-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 30px; color: var(--black); text-align: center; margin-bottom: 6px; letter-spacing: -.5px; }
    .auth-sub { text-align: center; font-size: 14px; color: var(--text2); margin-bottom: 28px; }

    /* Banners */
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; margin-bottom: 20px; display: none; text-align: center; }
    .alert-err { background: #ffeaea; color: #d02020; border: 1px solid #ffcaca; }
    .alert-succ { background: #eafbf1; color: #158244; border: 1px solid #c3f1d5; }

    /* ── FORM ── */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text2); margin-bottom: 7px; }
    .form-input { width: 100%; padding: 11px 14px; background: #fff; border: 1.5px solid var(--border); border-radius: 9px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text1); outline: none; transition: border-color .15s, box-shadow .15s; }
    .form-input:focus { border-color: var(--black); box-shadow: 0 0 0 3px rgba(17,17,17,.1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

    .auth-footer { text-align: center; font-size: 13.5px; color: var(--text2); margin-top: 18px; }
    .auth-footer .link { color: var(--black); font-weight: 700; cursor: pointer; text-decoration: none; border: none; background: none; font-family: 'DM Sans', sans-serif; font-size: 13.5px; }
    
    .toast-wrap { position: fixed; bottom: 28px; right: 28px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>

  <nav class="pub-nav">
    <a href="index.html" class="logo">
      <div class="logo-icon">🚀</div>
      <div class="logo-text">DeployDesk</div>
    </a>
    <div class="spacer"></div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="login.html" class="nav-link">Log In</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">
        <div class="logo-icon">🛡️</div>
        <div class="logo-text">System Admin</div>
      </a>
      <div class="auth-title">Admin Registration</div>
      <div class="auth-sub">Create a new organizational administrator account</div>

      <div class="alert alert-err" id="signupErr"></div>
      <div class="alert alert-succ" id="signupSuccess"></div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="form-input" type="text" id="suName" placeholder="e.g. System Admin"/>
        </div>
        <div class="form-group">
          <label class="form-label">Contact Number *</label>
          <input class="form-input" type="tel" id="suContact" placeholder="+63 9XX XXX XXXX"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Admin Email *</label>
        <input class="form-input" type="email" id="suEmail" placeholder="admin@university.edu"/>
      </div>
      
      <div class="form-group">
        <label class="form-label">Managed Organization *</label>
        <select class="form-input" id="suOrgGroup">
          <option value="" disabled selected>Select Organization</option>
          <option value="IMAGE">IMAGE</option>
          <option value="Cognizant">Cognizant</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password *</label>
          <input class="form-input" type="password" id="suPass" placeholder="••••••••"/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password *</label>
          <input class="form-input" type="password" id="suPassConfirm" placeholder="••••••••"/>
        </div>
      </div>

      <button class="btn btn-primary btn-full btn-lg" style="margin-top:4px; background: var(--black);" onclick="doSignup()">
        Create Admin Account
      </button>

      <div class="auth-footer">
        Already an admin? <a href="login.html" class="link">Log In Here</a>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="app.js"></script>
  <script>
    // Force the global variable so app.js registers this account as an Admin in the database!
    window.signupRole = 'admin';


    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '👁️'; 
        icon.style.opacity = '1';
      } else {
        input.type = 'password';
        icon.textContent = '👁️'; 
        icon.style.opacity = '0.6';
      }
    }
  </script>
</body>
</html>
